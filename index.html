<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Point Counter</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div class="top-bar">
    <input type="file" id="upload" accept="image/*">
    <span id="counter">Точек: 0</span>
    <button id="undoBtn">◀️</button>
    <button id="redoBtn">▶️</button>
    <button id="saveBtn">Сохранить</button>
    <button id="resetBtn">🗑️</button>

    <label style="margin-left: 10px;">
      <input type="checkbox" id="toggleNumbers" checked>
      Показывать цифры
    </label>

    <!-- Ползунки -->
    <label style="margin-left: 10px;">
      Размер: <input type="range" id="pointSize" min="5" max="50" value="20">
    </label>
    <label style="margin-left: 10px;">
      Прозрачность: <input type="range" id="pointOpacity" min="0" max="100" value="100">
    </label>
  </div>

  <div id="image-container">
    <img id="mainImage" alt="Загруженное изображение">
    <div id="points"></div>
  </div>

  <!-- Подключение модульного скрипта -->
  <script type="module" src="assets/js/app.js"></script>
</body>
</html>
