<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Point Counter - Подсчет объектов на изображении</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- html2canvas для сохранения изображения -->
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

    <!-- Наши стили -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="container-fluid h-100">
        <div class="row h-100">
            <!-- Панель инструментов -->
            <div class="col-12 bg-light border-bottom p-2">
                <div class="d-flex justify-content-between align-items-center">
                    <div class="d-flex gap-2">
                        <button id="load-btn" class="btn btn-primary btn-sm">
                            📁 Загрузить изображение
                        </button>
                        <button id="save-btn" class="btn btn-success btn-sm">
                            💾 Сохранить результат
                        </button>
                        <button id="reset-btn" class="btn btn-danger btn-sm">
                            🗑️ Сбросить
                        </button>
                    </div>
                    <div id="counter" class="fw-bold fs-5">
                        Точек: 0
                    </div>
                </div>

                <!-- Скрытый input для загрузки файлов -->
                <input type="file" id="file-input" accept="image/*" style="display: none;">
            </div>

            <!-- Основная область с изображением -->
            <div class="col-12 position-relative flex-grow-1 p-0">
                <div id="image-container" class="image-container">
                    <img id="main-image" src="" alt="Ваше изображение" class="main-image">
                    <div id="points-layer" class="points-layer"></div>
                </div>

                <!-- Сообщение при отсутствии изображения -->
                <div id="welcome-message" class="welcome-message">
                    <div class="text-center">
                        <h3>Point Counter</h3>
                        <p>Загрузите изображение для начала подсчета объектов</p>
                        <button id="welcome-load-btn" class="btn btn-primary">
                            📁 Выбрать изображение
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Наш JavaScript -->
    <script src="assets/js/app.js"></script>
</body>
</html>
